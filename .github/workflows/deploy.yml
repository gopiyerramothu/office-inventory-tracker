name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  S3_BUCKET: officeinventorystack-websitebucket75c24d94-7vcpokyu02wk
  CLOUDFRONT_DIST_ID: E1AFS6N4MULDGL
  VITE_API_URL: https://vn9gex386f.execute-api.us-east-1.amazonaws.com/prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npx vite build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend to S3
        run: aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }}/ --delete --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} --paths "/*"

      - name: Update Lambda function
        run: |
          cd backend
          zip -j /tmp/lambda.zip index.mjs
          aws lambda update-function-code --function-name OfficeInventoryStack-ApiHandler5E7490E8-EuHqfIxjByAg --zip-file fileb:///tmp/lambda.zip
